[ios]
provisioning = "app_store_connect"

[[target]]
platform         = "macos"
app.name         = "floats"
app.bundle_id    = "com.breakfastlabs.floats"
app.version      = "0.1.0"
app.build_number = "1"
build.icon_path  = "resources/icon.png"

