name: Release

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:

env:
  STRUDEL_VERSION: 'v0.5.0-beta.2'

jobs:
  release:
    runs-on: macos-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v7

      - name: Install strudel
        run: |
          asset="https://github.com/octavore/strudel/releases/download/${STRUDEL_VERSION}/strudel-${STRUDEL_VERSION}-aarch64-apple-darwin.tar.gz"
          curl -fsSL "$asset" -o strudel.tar.gz
          tar -xzf strudel.tar.gz
          install -m 755 strudel /usr/local/bin/strudel
          strudel --version

      - name: Write App Store Connect API key
        env:
          APPLE_API_KEY_CONTENTS: ${{ secrets.APPLE_API_KEY_CONTENTS }}
        run: echo "$APPLE_API_KEY_CONTENTS" > AuthKey.p8

      - name: Release
        env:
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          APPLE_TEAM_ID: ${{ vars.APPLE_TEAM_ID }}
          APPLE_API_ISSUER: ${{ vars.APPLE_API_ISSUER }}
          APPLE_API_KEY: ${{ vars.APPLE_API_KEY }}
          APPLE_API_KEY_PATH: AuthKey.p8
        run: strudel release

      - name: Locate DMG
        id: dmg
        run: echo "path=$(find .build/dist -name '*.dmg' -print -quit)" >> "$GITHUB_OUTPUT"

      - name: Create draft release
        uses: softprops/action-gh-release@v2
        with:
          draft: true
          files: ${{ steps.dmg.outputs.path }}
